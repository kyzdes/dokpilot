name: validate
on: [push, pull_request]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check SKILL.md exists
        run: test -f skills/dokpilot/SKILL.md

      - name: Check skill resource dirs present
        run: |
          test -d skills/dokpilot/scripts
          test -d skills/dokpilot/references
          test -d skills/dokpilot/templates
          test -d skills/dokpilot/config

      - name: Validate plugin.json
        run: jq -e '.name and .version and .description' .claude-plugin/plugin.json

      - name: Validate gemini-extension.json
        run: |
          jq -e '.name and .version and .contextFileName' gemini-extension.json
          test "$(jq -r .contextFileName gemini-extension.json)" = "GEMINI.md"

      - name: Check mirror parity (AGENTS.md, GEMINI.md == SKILL.md)
        run: |
          diff skills/dokpilot/SKILL.md AGENTS.md
          diff skills/dokpilot/SKILL.md GEMINI.md

      - name: Check SKILL.md frontmatter parses
        run: |
          head -30 skills/dokpilot/SKILL.md | grep -q '^---$'
          head -30 skills/dokpilot/SKILL.md | grep -q '^name:'
          head -30 skills/dokpilot/SKILL.md | grep -q '^description:'

      - name: node --check ui-server JS
        run: find mcp-server/ui-server -name '*.js' -not -path '*/node_modules/*' -print0 | xargs -0 -n1 node --check

      - name: node --check dashboard inline scripts
        run: bash scripts/check-inline-scripts.sh

      - name: shellcheck
        run: |
          command -v shellcheck >/dev/null || sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck -S warning scripts/*.sh skills/dokpilot/scripts/*.sh mcp-server/ui-server/lib/worker-helpers/*.sh

      - name: smoke (boot + routes, CI mode)
        run: node mcp-server/ui-server/smoke.js --ci

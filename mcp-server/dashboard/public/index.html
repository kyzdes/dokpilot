<!DOCTYPE html>
<html lang="en" data-theme="dark" data-accent="neon" data-density="comfortable">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
  <title>Dokpilot · Companion Dashboard (prototype)</title>
  <meta name="description" content="Dokpilot — operator-grade Dokploy companion dashboard. Deploy GitHub repos to your VPS with one command. Live prototype with MOCK_DATA.">

  <!-- OpenGraph for Telegram / Discord / Twitter link previews -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Dokpilot · Companion Dashboard">
  <meta property="og:description" content="Deploy anything. One command. No DevOps. Operator-grade Dokploy dashboard.">
  <meta property="og:image" content="og-image.png">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Dokpilot · Companion Dashboard">
  <meta name="twitter:description" content="Deploy anything. One command. No DevOps.">
  <meta name="twitter:image" content="og-image.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;450;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="tokens.css">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon-512.png">
  <link rel="apple-touch-icon" href="favicon-512.png">
  <style>
    /* Demo badge — visible when ?demo=1 OR window.location.hostname is not 127.0.0.1 */
    .demo-banner {
      position: fixed;
      bottom: 14px;
      right: 14px;
      z-index: 60;
      padding: 6px 11px 6px 9px;
      background: var(--accent-soft);
      border: 1px solid var(--accent-line);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10.5px;
      color: var(--accent);
      display: none;
      align-items: center;
      gap: 7px;
      box-shadow: 0 0 24px var(--accent-glow);
      letter-spacing: 0.02em;
    }
    .demo-banner.visible { display: inline-flex; }
    .demo-banner .demo-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
      animation: demoPulse 1.4s ease-in-out infinite;
    }
    @keyframes demoPulse { 50% { opacity: 0.45; transform: scale(0.88); } }
    .demo-banner a { color: var(--accent); text-decoration: underline; text-decoration-color: var(--accent-line); }
  </style>
</head>
<body>
  <div id="app"></div>
  <aside id="demo-banner" class="demo-banner" role="note">
    <span class="demo-dot" aria-hidden="true"></span>
    <span>Live prototype · MOCK_DATA · no backend wired</span>
    <span style="color: var(--meta);">·</span>
    <a href="https://github.com/kyzdes/dokpilot" target="_blank" rel="noopener">github</a>
  </aside>
  <script>
    // Show demo banner when NOT on 127.0.0.1 (i.e. anyone hitting the public Vercel URL)
    (function() {
      var h = window.location.hostname;
      if (h !== '127.0.0.1' && h !== 'localhost' && h !== '') {
        document.getElementById('demo-banner').classList.add('visible');
      }
    })();
  </script>
  <noscript>
    <div style="padding:24px;font-family:'JetBrains Mono',monospace;color:#39ff14;background:#0a0a0a;min-height:100vh;">
      Dokpilot dashboard requires JavaScript to render. The server-rendered fallback ships in Phase E.
    </div>
  </noscript>
  <script src="app.js"></script>
</body>
</html>
